<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Dispensaries Map</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root {
      --bg-top: #f8fbff;
      --bg-bottom: #e8eef8;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #0f172a;
      --subtext: #5a6780;
      --brand-red: #d2212e;
      --brand-red-dark: #ab1423;
      --chip-bg: #fff4f5;
      --accent: #1e90eb;
      --shadow: 0 16px 44px rgba(15, 23, 42, 0.18);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      position: absolute;
      inset: 0;
    }


    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(9, 15, 30, 0.52);
      backdrop-filter: blur(4px);
      opacity: 1;
      visibility: visible;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .modal-backdrop.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .modal {
      width: min(94vw, 560px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: linear-gradient(140deg, #fff3f5 0%, #fff9fb 30%, #f3f8ff 70%, #ecf4ff 100%);
      box-shadow: 0 28px 72px rgba(2, 6, 23, 0.32);
      padding: 20px;
      position: relative;
      animation: modal-in 180ms ease;
      overflow: hidden;
    }

    @keyframes modal-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 0;
      background: #edf1f8;
      color: #0f2747;
      font-size: 23px;
      line-height: 1;
      cursor: pointer;
      transition: background-color 140ms ease, transform 140ms ease;
    }

    .modal-close:hover {
      background: #e1e9f5;
      transform: scale(1.05);
    }

    .modal-head {
      position: relative;
      z-index: 1;
      padding-right: 42px;
      margin: 0 0 16px;
    }

    .modal-kicker {
      margin: 0 0 6px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
      color: #6a7b97;
    }

    .modal-name {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.02em;
      line-height: 1.08;
      color: #0d182c;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .chip-contact {
      color: var(--brand-red-dark);
      background: var(--chip-bg);
      border: 1px solid rgba(210, 33, 46, 0.2);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .info-card {
      text-decoration: none;
      color: inherit;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid #e8eef6;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
      transition: border-color 130ms ease, transform 130ms ease, box-shadow 130ms ease;
    }

    .info-card:hover {
      border-color: rgba(30, 144, 235, 0.4);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }

    .info-card.disabled {
      pointer-events: none;
      opacity: 0.68;
    }

    .info-card.wide {
      grid-column: 1 / -1;
    }

    .info-label {
      margin: 0 0 6px;
      color: #62748f;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .info-value {
      margin: 0;
      color: #0f172a;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 700;
      word-break: break-word;
    }

    @media (max-width: 700px) {
      .modal {
        padding: 16px;
      }

      .modal-name {
        font-size: 24px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .info-card.wide {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalName">
      <button id="modalClose" class="modal-close" aria-label="Close">&times;</button>
      <header class="modal-head">
        <p class="modal-kicker">Dispensary Profile</p>
        <h2 id="modalName" class="modal-name">-</h2>
        <div class="modal-tags">
          <span id="modalContact" class="chip chip-contact">-</span>
        </div>
      </header>

      <div class="info-grid">
        <a id="modalPhoneLink" class="info-card" href="#" rel="noopener noreferrer">
          <p class="info-label">Phone</p>
          <p id="modalPhone" class="info-value">-</p>
        </a>

        <a id="modalEmailLink" class="info-card" href="#" rel="noopener noreferrer">
          <p class="info-label">Email</p>
          <p id="modalEmail" class="info-value">-</p>
        </a>

        <div class="info-card wide">
          <p class="info-label">Address</p>
          <p id="modalAddress" class="info-value">-</p>
        </div>
      </div>
    </section>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAkualh6RFcWiFxqA2QXlddCps9gdamSduvOCmTB7jO_8L0J3nLv8yANsSsiCKnUI6v6ZpMRyzCPWE/pub?output=csv";

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalClose = document.getElementById("modalClose");
    const modalName = document.getElementById("modalName");
    const modalContact = document.getElementById("modalContact");
    const modalPhone = document.getElementById("modalPhone");
    const modalEmail = document.getElementById("modalEmail");
    const modalAddress = document.getElementById("modalAddress");
    const modalPhoneLink = document.getElementById("modalPhoneLink");
    const modalEmailLink = document.getElementById("modalEmailLink");

    const map = new maplibregl.Map({
      container: "map",
      style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
      center: [-98.5795, 39.8283],
      zoom: 3.6,
      attributionControl: true
    });

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

    function createHeartMarkerIcon() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, size, size);
      ctx.shadowColor = "rgba(120, 12, 24, 0.35)";
      ctx.shadowBlur = 16;
      ctx.shadowOffsetY = 8;
      ctx.strokeStyle = "#d2212e";
      ctx.lineWidth = 11;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.moveTo(64, 102);
      ctx.bezierCurveTo(55, 87, 34, 73, 23, 55);
      ctx.bezierCurveTo(12, 37, 18, 17, 40, 16);
      ctx.bezierCurveTo(52, 15, 60, 22, 64, 33);
      ctx.bezierCurveTo(68, 22, 76, 15, 88, 16);
      ctx.bezierCurveTo(110, 17, 116, 37, 105, 55);
      ctx.bezierCurveTo(94, 73, 73, 87, 64, 102);
      ctx.stroke();

      ctx.shadowColor = "transparent";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(39, 27);
      ctx.quadraticCurveTo(50, 20, 59, 24);
      ctx.stroke();

      const imageData = ctx.getImageData(0, 0, size, size);
      return {
        width: imageData.width,
        height: imageData.height,
        data: imageData.data
      };
    }

    function parseCoordinate(value, min, max) {
      if (value === undefined || value === null) return null;
      const raw = String(value).trim();
      if (!raw) return null;
      const normalized = raw.replace(",", ".");
      const parsed = Number(normalized);
      if (!Number.isFinite(parsed)) return null;
      if (parsed < min || parsed > max) return null;
      return parsed;
    }

    function toFeature(row) {
      const lat = parseCoordinate(row.latitude, -90, 90);
      const lon = parseCoordinate(row.longitude, -180, 180);
      if (lat === null || lon === null) return null;

      return {
        type: "Feature",
        geometry: {
          type: "Point",
          coordinates: [lon, lat]
        },
        properties: {
          Name: row.Name || "",
          Contact: row.Contact || "",
          Phone: row.Phone || "",
          Email: row.Email || "",
          Address: row.Address || ""
        }
      };
    }

    function setLinkState(linkEl, textEl, displayValue, hrefValue, hrefPrefix) {
      const visible = (displayValue || "").trim();
      const target = (hrefValue || "").trim();
      textEl.textContent = visible || "-";

      if (!target) {
        linkEl.classList.add("disabled");
        linkEl.removeAttribute("href");
        return;
      }

      linkEl.classList.remove("disabled");
      linkEl.href = hrefPrefix + target;
    }

    function openModal(props) {
      const contact = (props.Contact || "").trim() || "No contact listed";

      modalName.textContent = props.Name || "Unnamed Dispensary";
      modalContact.textContent = contact;
      modalAddress.textContent = (props.Address || "").trim() || "-";

      const phoneRaw = (props.Phone || "").trim();
      const phoneHref = phoneRaw.replace(/[^\d+]/g, "");
      setLinkState(modalPhoneLink, modalPhone, phoneRaw, phoneHref, "tel:");

      const emailRaw = (props.Email || "").trim();
      setLinkState(modalEmailLink, modalEmail, emailRaw, emailRaw, "mailto:");

      modalBackdrop.classList.remove("hidden");
      modalBackdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalBackdrop.classList.add("hidden");
      modalBackdrop.setAttribute("aria-hidden", "true");
    }

    modalClose.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    map.on("load", async () => {
      map.addImage("dispensary-icon", createHeartMarkerIcon());

      try {
        const rows = await d3.csv(CSV_URL);
        const features = [];

        for (const row of rows) {
          const feature = toFeature(row);
          if (feature) features.push(feature);
        }

        map.addSource("dispensaries", {
          type: "geojson",
          data: {
            type: "FeatureCollection",
            features
          }
        });

        map.addLayer({
          id: "dispensary-layer",
          type: "symbol",
          source: "dispensaries",
          layout: {
            "icon-image": "dispensary-icon",
            "icon-size": [
              "interpolate",
              ["linear"],
              ["zoom"],
              3, 0.16,
              8, 0.24,
              12, 0.31
            ],
            "icon-allow-overlap": true
          }
        });

        map.on("mouseenter", "dispensary-layer", () => {
          map.getCanvas().style.cursor = "pointer";
        });

        map.on("mouseleave", "dispensary-layer", () => {
          map.getCanvas().style.cursor = "";
        });

        map.on("click", "dispensary-layer", (event) => {
          const feature = event.features && event.features[0];
          if (!feature) return;
          openModal(feature.properties || {});
        });

        if (features.length) {
          const bounds = new maplibregl.LngLatBounds();
          for (const feature of features) {
            bounds.extend(feature.geometry.coordinates);
          }
          map.fitBounds(bounds, {
            padding: 70,
            maxZoom: 11,
            duration: 800
          });
        }
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
